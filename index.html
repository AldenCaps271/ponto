<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Alden Caps - Ponto</title><style>*{box-sizing:border-box;margin:0;padding:0}:root{--g:#C9A84C;--gd:#8a6f2e;--p:#111009;--c:#1c1a10;--c2:#252010;--b:rgba(201,168,76,.2);--b2:rgba(201,168,76,.4);--t:#f0ede6;--t2:#a8a49d}html,body{height:100%;background:var(--p);color:var(--t);font-family:-apple-system,sans-serif}.s{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}.s.on{display:flex}.lc{width:90px;height:90px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;border:2px solid var(--g)}.lc span{font-size:28px;font-weight:700;color:var(--p)}.tt{font-size:22px;font-weight:300;color:var(--g);text-align:center}.bk{display:inline-block;font-size:11px;padding:3px 14px;border-radius:20px;background:rgba(201,168,76,.15);color:var(--g);margin:.5rem 0 1.5rem;letter-spacing:.08em}.ls{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px}.fb{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--c);border:1px solid var(--b);border-radius:12px;cursor:pointer;text-align:left;width:100%}.fb:hover{border-color:var(--g)}.av{width:44px;height:44px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--p);flex-shrink:0}.fn{font-size:15px;font-weight:500}.fc{font-size:12px;color:var(--t2)}.fst{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}.ok{background:rgba(97,185,32,.15);color:#7dcf3a}.nd{background:rgba(255,255,255,.07);color:var(--t2)}.pres{background:rgba(201,168,76,.15);color:var(--g)}.ba{width:100%;max-width:420px;padding:11px;margin-top:8px;background:none;border:1px dashed var(--b2);border-radius:12px;color:var(--g);font-size:13px;cursor:pointer}#tp{align-items:stretch;padding:0;justify-content:flex-start}.hd{background:var(--c);border-bottom:1px solid var(--b);padding:.75rem 1.25rem;display:flex;align-items:center;gap:12px;width:100%}.hl{width:32px;height:32px;border-radius:8px;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--p)}.hi{flex:1}.hn{font-size:15px;font-weight:500}.hc{font-size:12px;color:var(--t2)}.bv{background:none;border:none;color:var(--t2);font-size:13px;cursor:pointer;padding:6px 10px;border-radius:8px}.sy{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:12px;background:rgba(255,255,255,.05)}.dt{width:7px;height:7px;border-radius:50%}.dg{background:#7dcf3a;animation:p 2s infinite}.da{background:var(--g)}.dr{background:#f09595}@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}.pb{flex:1;padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:1.25rem;width:100%;max-width:520px;margin:0 auto}.rh{text-align:center;padding:.75rem 0}.rt{font-size:54px;font-weight:200;letter-spacing:-2px;color:var(--g);font-variant-numeric:tabular-nums}.rd{font-size:13px;color:var(--t2);margin-top:4px}.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mb{padding:18px 12px;border-radius:12px;border:1.5px solid;font-size:14px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}.mb:active{transform:scale(.97)}.mb:disabled{opacity:.3;cursor:not-allowed}.mb .hr{font-size:11px;opacity:.8;margin-top:2px}.mb svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.m1{background:#162210;border-color:#3B6D11;color:#7dcf3a}.m2{background:#221808;border-color:#C9A84C;color:#e8c86a}.m3{background:#0d1a22;border-color:#2e7ab0;color:#7fb8e0}.m4{background:#221010;border-color:#A32D2D;color:#f09595}.ck{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:currentColor;display:flex;align-items:center;justify-content:center}.ck svg{width:10px;height:10px;stroke:var(--p);stroke-width:2.5}.rs{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:1rem 1.25rem}.rstit{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}.rg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.ri{text-align:center}.rl{font-size:11px;color:var(--t2);margin-bottom:3px}.rv{font-size:15px;font-weight:500;color:var(--g)}#ta{align-items:stretch;padding:0;justify-content:flex-start}.ab{flex:1;padding:1.25rem;overflow-y:auto;width:100%}.tabs{display:flex;background:var(--c);border:1px solid var(--b);border-radius:10px;margin-bottom:1.25rem;overflow:hidden}.tab{flex:1;padding:10px;font-size:13px;background:none;border:none;color:var(--t2);cursor:pointer}.tab.on{background:var(--g);color:var(--p);font-weight:600}.pan{display:none}.pan.on{display:block}.fl{display:flex;flex-direction:column;gap:8px}.fcard{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}.fav{width:38px;height:38px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--p);flex-shrink:0}.brm{background:none;border:1px solid rgba(242,74,74,.3);border-radius:6px;color:#f09595;font-size:12px;padding:4px 10px;cursor:pointer;margin-left:auto}.fadd{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:1rem;margin-top:1rem}.fadd h4{font-size:13px;font-weight:500;margin-bottom:12px;color:var(--g)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.fr input{padding:9px 10px;background:var(--p);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:13px;width:100%}.bs{width:100%;padding:10px;background:var(--g);color:var(--p);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}.info-b{background:var(--c);border-left:3px solid var(--g);border-radius:10px;padding:12px 14px;margin-bottom:1rem;font-size:13px;line-height:1.6;color:var(--t2)}.info-b strong{color:var(--g)}#mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;align-items:center;justify-content:center;padding:1rem}.mbox{background:var(--c);border:1px solid var(--b2);border-radius:14px;padding:1.5rem;width:100%;max-width:300px}.mbox h3{font-size:16px;font-weight:500;margin-bottom:1rem;color:var(--g)}.mbox input{width:100%;padding:10px 12px;background:var(--p);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:14px;margin-bottom:10px}.mbtns{display:flex;gap:8px}.mbtns button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none}.bcnl{background:var(--c2);color:var(--t2)}.bok{background:var(--g);color:var(--p);font-weight:600}.merr{font-size:12px;color:#f09595;margin-bottom:8px;display:none}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.tok{background:var(--g);color:var(--p)}.terr{background:#A32D2D;color:#f0ede6}.empty{text-align:center;padding:2rem;color:var(--t2);font-size:14px}</style></head><body><div class="s on" id="ts"><div style="text-align:center;margin-bottom:2rem"><div class="lc"><span>AC</span></div><div class="tt">Alden Caps</div><span class="bk" id="bsetor">PONTO</span></div><div class="ls" id="lista"></div><button class="ba" onclick="abrirAdmin()">&#9881; Painel administrativo</button></div><div class="s" id="tp" style="justify-content:flex-start"><div class="hd"><div class="hl" id="hini">AC</div><div class="hi"><div class="hn" id="pnome">-</div><div class="hc" id="pcargo">-</div></div><div class="sy"><div class="dt da" id="sdot"></div><span id="stxt">-</span></div><button class="bv" onclick="voltar()">&#8592; Voltar</button></div><div class="pb"><div class="rh"><div class="rt" id="rel">00:00:00</div><div class="rd" id="red"></div></div><div class="mg"><button class="mb m1" id="bENTRADA" onclick="marcar('ENTRADA')"><svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Entrada<span class="hr" id="hENTRADA"></span></button><button class="mb m2" id="bSAIDA_ALMOCO" onclick="marcar('SAIDA_ALMOCO')"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Saida Almoco<span class="hr" id="hSAIDA_ALMOCO"></span></button><button class="mb m3" id="bRETORNO_ALMOCO" onclick="marcar('RETORNO_ALMOCO')"><svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-5.36L1 10"/></svg>Retorno<span class="hr" id="hRETORNO_ALMOCO"></span></button><button class="mb m4" id="bSAIDA" onclick="marcar('SAIDA')"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Saida<span class="hr" id="hSAIDA"></span></button></div><div class="rs"><div class="rstit">Registros de hoje</div><div class="rg"><div class="ri"><div class="rl">Entrada</div><div class="rv" id="rENTRADA">-</div></div><div class="ri"><div class="rl">S.Almoco</div><div class="rv" id="rSAIDA_ALMOCO">-</div></div><div class="ri"><div class="rl">Retorno</div><div class="rv" id="rRETORNO_ALMOCO">-</div></div><div class="ri"><div class="rl">Saida</div><div class="rv" id="rSAIDA">-</div></div></div></div></div></div><div class="s" id="ta" style="justify-content:flex-start"><div class="hd"><div class="hl">AC</div><div class="hi"><div class="hn">Painel Admin</div><div class="hc" id="adm-setor">Alden Caps</div></div><button class="bv" onclick="voltar()">&#8592; Voltar</button></div><div class="ab"><div class="tabs"><button class="tab on" onclick="aba('f')">Funcionarios</button><button class="tab" onclick="aba('c')">Config.</button></div><div class="pan on" id="pf"><div class="info-b">Cada marcacao vai para <strong>Ponto Alden Caps</strong> no Google Sheets em tempo real.</div><div class="fl" id="adml"></div><div class="fadd"><h4>+ Adicionar funcionario</h4><div class="fr"><input type="text" id="fnome" placeholder="Nome completo"><input type="text" id="fcargo" placeholder="Cargo (opcional)"></div><button class="bs" onclick="addF()">Salvar</button></div></div><div class="pan" id="pc"><div class="fadd" style="margin-top:0"><h4>Configuracoes</h4><div class="fr" style="grid-template-columns:1fr"><input type="text" id="csetor" placeholder="Nome do setor"></div><div class="fr" style="grid-template-columns:1fr"><input type="password" id="csenha" placeholder="Nova senha"></div><button class="bs" onclick="salvarC()">Salvar</button></div><div class="fadd" style="margin-top:10px"><h4 style="color:#f09595">Perigo</h4><button class="bs" style="background:#A32D2D;color:#fff;margin-top:0" onclick="resetar()">Apagar tudo</button></div></div></div></div><div id="mod"><div class="mbox"><h3>Painel Admin</h3><div class="merr" id="merr">Senha incorreta</div><input type="password" id="msenha" placeholder="Senha" onkeydown="if(event.key==='Enter')okAdm()"><div class="mbtns"><button class="bcnl" onclick="fechaMod()">Cancelar</button><button class="bok" onclick="okAdm()">Entrar</button></div></div></div><div class="toast" id="toast"></div><script>const SU='https://script.google.com/macros/s/AKfycbzpQGGXwWVPfnCt9hnC89WlJddybBzFKIUE0mcwzJZyM2fJSXHYK1H7abIfkGjXi9Ow/exec';const NS='acponto_';const DB={get cfg(){return JSON.parse(localStorage.getItem(NS+'cfg')||'{"setor":"Alden Caps","senha":"1234"}')},get funcs(){return JSON.parse(localStorage.getItem(NS+'funcs')||'[]')},get regs(){return JSON.parse(localStorage.getItem(NS+'regs')||'[]')},set cfg(v){localStorage.setItem(NS+'cfg',JSON.stringify(v))},set funcs(v){localStorage.setItem(NS+'funcs',JSON.stringify(v))},set regs(v){localStorage.setItem(NS+'regs',JSON.stringify(v))}};let fa=null;function boot(){const c=DB.cfg;document.getElementById('bsetor').textContent=c.setor.toUpperCase();document.getElementById('adm-setor').textContent=c.setor;rl();setInterval(tick,1000);tick();ms('ts');}function tick(){const n=new Date(),p=v=>String(v).padStart(2,'0'),el=document.getElementById('rel');if(el)el.textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());const D=['Domingo','Segunda-feira','Terca-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sabado'],M=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'],de=document.getElementById('red');if(de)de.textContent=D[n.getDay()]+', '+n.getDate()+' de '+M[n.getMonth()]+' de '+n.getFullYear();}function rl(){const fs=DB.funcs,h=new Date().toISOString().slice(0,10),el=document.getElementById('lista');if(!fs.length){el.innerHTML='<div class="empty">Nenhum funcionario ainda. Painel > Funcionarios</div>';return;}el.innerHTML=fs.map(f=>{const r=DB.regs.filter(x=>x.fid===f.id&&x.data===h),t=r.map(x=>x.tipo);let s,c;t.includes('SAIDA')?(s='Saiu',c='ok'):t.includes('ENTRADA')?(s='Presente',c='pres'):(s='Ausente',c='nd');const ini=f.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();return'<button class="fb" onclick="ap(''+f.id+'')"><div class="av">'+ini+'</div><div><div class="fn">'+f.nome+'</div><div class="fc">'+(f.cargo||'-')+'</div></div><span class="fst '+c+'">'+s+'</span></button>';}).join('');}function ap(id){fa=DB.funcs.find(f=>f.id===id);if(!fa)return;document.getElementById('pnome').textContent=fa.nome;document.getElementById('pcargo').textContent=fa.cargo||'Funcionario';document.getElementById('hini').textContent=fa.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();ms('tp');ab();ss('i');}async function marcar(tipo){const n=new Date(),p=v=>String(v).padStart(2,'0'),hora=p(n.getHours())+':'+p(n.getMinutes()),data=n.toISOString().slice(0,10),regs=DB.regs;if(regs.find(r=>r.fid===fa.id&&r.data===data&&r.tipo===tipo)){toast('Ja registrado!',1);return;}const reg={id:Date.now(),fid:fa.id,tipo,hora,data};regs.push(reg);DB.regs=regs;ab();const lb={ENTRADA:'Entrada',SAIDA_ALMOCO:'Saida almoco',RETORNO_ALMOCO:'Retorno',SAIDA:'Saida'};toast(lb[tipo]+' as '+hora);rl();es(reg);}function ss(s){const d=document.getElementById('sdot'),x=document.getElementById('stxt');if(!d)return;if(s==='ok'){d.className='dt dg';x.textContent='Enviado';}else if(s==='s'){d.className='dt da';x.textContent='Enviando...';}else if(s==='e'){d.className='dt dr';x.textContent='Offline';}else{d.className='dt da';x.textContent='-';}}async function es(reg){ss('s');const fu=DB.funcs.find(f=>f.id===reg.fid),pl={setor:DB.cfg.setor,nome:fu?.nome||'-',cargo:fu?.cargo||'-',tipo:reg.tipo,hora:reg.hora,data:reg.data,timestamp:new Date().toISOString()};try{await fetch(SU,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(pl)});ss('ok');}catch(e){ss('e');}}function ab(){const h=new Date().toISOString().slice(0,10),f={};DB.regs.filter(x=>x.fid===fa.id&&x.data===h).forEach(x=>f[x.tipo]=x.hora);['ENTRADA','SAIDA_ALMOCO','RETORNO_ALMOCO','SAIDA'].forEach(t=>{const b=document.getElementById('b'+t),hr=document.getElementById('h'+t),r=document.getElementById('r'+t);if(f[t]){b.disabled=true;hr.textContent=f[t];r.textContent=f[t];if(!b.querySelector('.ck')){const ok=document.createElement('span');ok.className='ck';ok.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';b.appendChild(ok);}}else{b.disabled=false;hr.textContent='';r.textContent='-';const ok=b.querySelector('.ck');if(ok)ok.remove();}});}function abrirAdmin(){document.getElementById('merr').style.display='none';document.getElementById('msenha').value='';document.getElementById('mod').style.display='flex';setTimeout(()=>document.getElementById('msenha').focus(),100);}function fechaMod(){document.getElementById('mod').style.display='none';}function okAdm(){if(document.getElementById('msenha').value===DB.cfg.senha){fechaMod();ms('ta');aba('f');rad();}else document.getElementById('merr').style.display='block';}function aba(a){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['f','c'][i]===a));document.querySelectorAll('.pan').forEach(p=>p.classList.remove('on'));document.getElementById('p'+a).classList.add('on');if(a==='f')rad();else document.getElementById('csetor').value=DB.cfg.setor||'';}function rad(){const el=document.getElementById('adml'),fs=DB.funcs;if(!fs.length){el.innerHTML='<div class="empty">Nenhum funcionario</div>';return;}el.innerHTML=fs.map(f=>'<div class="fcard"><div class="fav">'+f.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()+'</div><div><div class="fn">'+f.nome+'</div><div style="font-size:12px;color:var(--t2)">'+(f.cargo||'-')+'</div></div><button class="brm" onclick="rmF(''+f.id+'')">Remover</button></div>').join('');}function addF(){const nome=document.getElementById('fnome').value.trim(),cargo=document.getElementById('fcargo').value.trim();if(!nome){toast('Informe o nome',1);return;}const fs=DB.funcs;fs.push({id:Date.now().toString(),nome,cargo});DB.funcs=fs;document.getElementById('fnome').value='';document.getElementById('fcargo').value='';rad();rl();toast('Adicionado!');}function rmF(id){if(!confirm('Remover?'))return;DB.funcs=DB.funcs.filter(f=>f.id!==id);rad();rl();toast('Removido');}function salvarC(){const cfg=DB.cfg,s=document.getElementById('csetor').value.trim(),p=document.getElementById('csenha').value.trim();if(s)cfg.setor=s;if(p&&p.length>=4)cfg.senha=p;DB.cfg=cfg;document.getElementById('bsetor').textContent=cfg.setor.toUpperCase();document.getElementById('adm-setor').textContent=cfg.setor;toast('Salvo!');}function resetar(){if(!confirm('Apagar TUDO?'))return;[NS+'cfg',NS+'funcs',NS+'regs'].forEach(k=>localStorage.removeItem(k));location.reload();}function ms(id){document.querySelectorAll('.s').forEach(t=>t.classList.toggle('on',t.id===id));}function voltar(){fa=null;ms('ts');rl();}let tT;function toast(msg,e=0){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+(e?'terr':'tok');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2800);}boot();</script></body></html>
